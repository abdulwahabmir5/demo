<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Performance Analytics - Login</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#eef2ff,#f8fbff);
            overflow:hidden;
            position:relative;
        }

        /* Background Shapes */
        body::before{
            content:'';
            position:absolute;
            width:450px;
            height:450px;
            background:rgba(79,70,229,0.12);
            border-radius:50%;
            top:-150px;
            right:-120px;
        }

        body::after{
            content:'';
            position:absolute;
            width:350px;
            height:350px;
            background:rgba(124,58,237,0.10);
            border-radius:50%;
            bottom:-120px;
            left:-100px;
        }

        /* =========================
           LOGIN CARD
        ========================== */
        .login-container{
            width:100%;
            max-width:420px;
            background:rgba(255,255,255,0.85);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,0.4);
            border-radius:28px;
            padding:40px;
            box-shadow:0 20px 50px rgba(0,0,0,0.08);
            position:relative;
            z-index:10;
            animation:fadeIn 0.6s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* Logo */
        .logo-box{
            width:85px;
            height:85px;
            margin:0 auto 20px;
            border-radius:22px;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
            font-size:36px;
            box-shadow:0 12px 30px rgba(79,70,229,0.35);
        }

        h2{
            text-align:center;
            font-size:30px;
            margin-bottom:8px;
            color:#111827;
            font-weight:700;
        }

        .subtitle{
            text-align:center;
            color:#6b7280;
            font-size:14px;
            margin-bottom:35px;
        }

        /* =========================
           FORM
        ========================== */
        .form-group{
            margin-bottom:22px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#374151;
            font-size:14px;
            font-weight:600;
        }

        .input-box{
            position:relative;
        }

        .input-box i{
            position:absolute;
            top:50%;
            left:15px;
            transform:translateY(-50%);
            color:#9ca3af;
            font-size:15px;
        }

        input{
            width:100%;
            padding:14px 16px 14px 46px;
            border-radius:14px;
            border:1px solid #d1d5db;
            background:#fff;
            font-size:15px;
            transition:0.3s ease;
            outline:none;
        }

        input:focus{
            border-color:#4f46e5;
            box-shadow:0 0 0 4px rgba(79,70,229,0.12);
        }

        /* Login Button */
        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:14px;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s ease;
            margin-top:10px;
        }

        button:hover{
            transform:translateY(-2px);
            box-shadow:0 12px 25px rgba(79,70,229,0.35);
        }

        /* Register Link */
        .register-link{
            margin-top:22px;
            text-align:center;
            font-size:14px;
            color:#6b7280;
        }

        .register-link a{
            color:#4f46e5;
            font-weight:600;
            text-decoration:none;
        }

        .register-link a:hover{
            text-decoration:underline;
        }

        /* Message Box */
        #message{
            margin-top:20px;
            padding:14px;
            border-radius:14px;
            display:none;
            text-align:center;
            font-size:14px;
            font-weight:600;
            animation:fadeIn 0.3s ease;
        }

        .success{
            background:#dcfce7;
            color:#166534;
            border:1px solid #bbf7d0;
        }

        .error{
            background:#fee2e2;
            color:#991b1b;
            border:1px solid #fecaca;
        }

        /* Footer */
        .footer-text{
            margin-top:30px;
            text-align:center;
            color:#9ca3af;
            font-size:12px;
        }

        /* Responsive */
        @media(max-width:500px){

            .login-container{
                margin:20px;
                padding:30px 24px;
            }

            h2{
                font-size:24px;
            }
        }

    </style>
</head>

<body>

    <!-- =========================
         LOGIN CONTAINER
    ========================== -->
    <div class="login-container">

        <!-- Logo -->
        <div class="logo-box">
            <i class="fa-solid fa-chart-line"></i>
        </div>

        <h2>Welcome Back</h2>

        <p class="subtitle">
            Sign in to access your analytics dashboard
        </p>

        <!-- Login Form -->
        <form id="loginForm">

            <!-- Username -->
            <div class="form-group">

                <label for="username">Username</label>

                <div class="input-box">
                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        id="username"
                        required
                        placeholder="Enter your username"
                    />
                </div>

            </div>

            <!-- Password -->
            <div class="form-group">

                <label for="password">Password</label>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        required
                        placeholder="Enter your password"
                    />
                </div>

            </div>

            <!-- Login Button -->
            <button type="submit">
                <i class="fa-solid fa-right-to-bracket"></i>
                Sign In
            </button>

        </form>

        <!-- Register Link -->
        <div class="register-link">
            Don't have an account?
            <a href="registration.html">Register Here</a>
        </div>

        <!-- Message Box -->
        <div id="message"></div>

        <!-- Footer -->
        <div class="footer-text">
            © 2026 Student Performance Analytics System
        </div>

    </div>

    <!-- =========================
         JAVASCRIPT
    ========================== -->

</body>
</html>
